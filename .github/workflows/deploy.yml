name: Deploy to Niagahoster

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.1"
                  extensions: mbstring, pdo_mysql, fileinfo, gd, zip

            - name: Clear Composer cache
              run: composer clear-cache || true

            - name: Install Composer dependencies
              run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs 2>&1
                  || composer update --no-dev --optimize-autoloader
                  --ignore-platform-reqs

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "18"

            - name: Install NPM dependencies
              run: npm install

            - name: Build assets
              run: npm run production

            - name: Create deployment package
              run: |
                  mkdir -p deployment
                  # Copy Laravel directories
                  cp -r app bootstrap config database Modules public resources routes storage deployment/
                  # Copy files
                  cp artisan composer.json composer.lock package.json package-lock.json index.php .env.production deployment/
                  # Copy WordPress files jika ada
                  find . -maxdepth 1 -name "wp-*.php" -o -name "xmlrpc.php" | xargs -I {} cp {} deployment/ 2>/dev/null || true
                  # Copy vendor
                  cp -r vendor deployment/ 2>/dev/null || true

            - name: Deploy via SFTP
              uses: wangyucode/sftp-upload-action@v2.0.2
              with:
                  host: ${{ secrets.NIAGAHOSTER_HOST }}
                  username: ${{ secrets.NIAGAHOSTER_USERNAME }}
                  password: ${{ secrets.NIAGAHOSTER_PASSWORD }}
                  localDir: "./deployment"
                  remoteDir: "./public_html"
                  sftpArgs: "-o ConnectTimeout=10 -o StrictHostKeyChecking=no"
              continue-on-error: true

            - name: Run Laravel migrations & cache clear
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.NIAGAHOSTER_HOST }}
                  username: ${{ secrets.NIAGAHOSTER_USERNAME }}
                  password: ${{ secrets.NIAGAHOSTER_PASSWORD }}
                  port: 22
                  command_timeout: 60m
                  script: |
                      cd ~/public_html
                      php artisan migrate --force || true
                      php artisan cache:clear || true
                      php artisan config:cache || true
                      php artisan storage:link || true
              continue-on-error: true

            - name: Deployment notification
              if: always()
              run: echo "Deployment completed"
