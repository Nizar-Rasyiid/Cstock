name: Deploy to Niagahoster

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    deploy:
        if: github.event_name == 'push'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: false

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.1"
                  extensions: mbstring, pdo_mysql, fileinfo, gd, zip

            - name: Clear Composer cache
              run: composer clear-cache || true

            - name: Install Composer dependencies
              run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs 2>&1
                  || composer update --no-dev --optimize-autoloader
                  --ignore-platform-reqs

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "18"

            - name: Install NPM dependencies
              run: npm install

            - name: Build assets
              run: |
                  npm install laravel-vite-plugin
                  npm run build

            - name: Create deployment package
              run: |
                  mkdir -p deployment
                  # Copy Laravel directories
                  cp -r app bootstrap config database Modules resources routes storage deployment/
                  # Copy public with build assets
                  cp -r public deployment/
                  # Copy dashboardapp (submodule)
                  cp -r dashboardapp deployment/ 2>/dev/null || true
                  # Copy files
                  cp artisan composer.json composer.lock package.json package-lock.json index.php .env.production deployment/
                  # Copy WordPress files jika ada
                  find . -maxdepth 1 -name "wp-*.php" -o -name "xmlrpc.php" | xargs -I {} cp {} deployment/ 2>/dev/null || true
                  # Copy vendor
                  cp -r vendor deployment/ 2>/dev/null || true
                  # Show what we're deploying
                  du -sh deployment/

            - name: Print runner public IP
              run: |
                  echo "Runner public IPs (for FTP whitelist):"
                  curl -s https://api.ipify.org; echo
                  curl -s https://ifconfig.me; echo

            - name: Validate deploy secrets
              if: github.event_name == 'push'
              shell: bash
              run: |
                  if [[ -z "${{ secrets.NIAGAHOSTER_PASSWORD }}" ]]; then
                    echo "❌ ERROR: Missing secret NIAGAHOSTER_PASSWORD"
                    echo "📍 Go to: Settings → Secrets and variables → Actions"
                    echo "➕ Create secret:"
                    echo "   Name: NIAGAHOSTER_PASSWORD"
                    echo "   Value: Cstock2026!"
                    exit 1
                  fi
                  echo "✅ Password secret present"

            - name: Deploy via FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: 46.202.186.170
                  username: u617448022.cstock.id
                  password: ${{ secrets.NIAGAHOSTER_PASSWORD }}
                  local-dir: ./deployment/
                  server-dir: /public_html/

            - name: Deployment notification
              if: always()
              run: |
                  echo "✅ FTP deployment completed!"
                  echo "📝 Next steps: SSH ke server dan run migrations manual jika perlu"
                  echo "   cd ~/public_html && php artisan migrate --force && php artisan cache:clear"
